# WinVMJ Generated Docker Compose (Local Dev)
# Product: LabelDelta

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: labeldelta-postgres
    environment:
      POSTGRES_DB: labeldelta
      POSTGRES_USER: ${AMANAH_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${AMANAH_DB_PASSWORD:-postgres123}
    ports:
      - "${HOST_PORT_POSTGRES:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - labeldelta-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labeldelta-backend
    environment:
      AMANAH_HOST_BE: ${AMANAH_HOST_BE:-0.0.0.0}
      AMANAH_PORT_BE: ${AMANAH_PORT_BE:-7776}
      AMANAH_DB_URL: ${AMANAH_DB_URL:-jdbc:postgresql://postgres:5432/labeldelta}
      AMANAH_DB_USERNAME: ${AMANAH_DB_USERNAME:-postgres}
      AMANAH_DB_PASSWORD: ${AMANAH_DB_PASSWORD:-postgres123}
    ports:
      - "${HOST_PORT_BE:-7776}:${AMANAH_PORT_BE:-7776}"
    networks:
      - labeldelta-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  labeldelta-network:
    driver: bridge

volumes:
  postgres_data:
